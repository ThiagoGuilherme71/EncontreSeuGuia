<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="512" height="512" role="img" aria-label="Trilhas — símbolo da montanha">
  <defs>
    <filter id="rough" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.016" numOctaves="3" seed="7" result="n"></feTurbulence>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="2.4" xChannelSelector="R" yChannelSelector="G"></feDisplacementMap>
    </filter>
    <pattern id="htSage" width="7" height="7" patternUnits="userSpaceOnUse" patternTransform="rotate(12)">
      <circle cx="1.8" cy="1.8" r="1.5" fill="#2F4A3A"></circle>
    </pattern>
  </defs>

  
  <g filter="url(#rough)" stroke="#C76B4A" stroke-width="5" stroke-linecap="round">
    <line x1="128" y1="26" x2="128" y2="11"></line>
    <line x1="156" y1="38" x2="167" y2="27"></line>
    <line x1="168" y1="66" x2="183" y2="66"></line>
    <line x1="156" y1="94" x2="167" y2="105"></line>
    <line x1="100" y1="38" x2="89" y2="27"></line>
    <line x1="88" y1="66" x2="73" y2="66"></line>
    <line x1="100" y1="94" x2="89" y2="105"></line>
  </g>

  
  <circle cx="128" cy="66" r="31" fill="#E0B879" filter="url(#rough)"></circle>

  
  <path d="M30 158 L82 80 L112 120 L142 66 L178 158 Z" fill="#DDA189" filter="url(#rough)" transform="translate(5,5)"></path>

  
  <path d="M26 156 L78 78 L108 118 L138 64 L174 156 Z" fill="#7E9B79" filter="url(#rough)"></path>
  <path d="M26 156 L78 78 L108 118 L138 64 L174 156 Z" fill="url(#htSage)" opacity="0.5"></path>

  
  <path d="M69 90 L78 78 L87 92" fill="none" stroke="#F3EAD6" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#rough)"></path>
  <path d="M129 76 L138 64 L147 78" fill="none" stroke="#F3EAD6" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#rough)"></path>
</svg>